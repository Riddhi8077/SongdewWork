<div class="search-container">

    <input
        type="text"
        class="search-input"
        placeholder="Search"
        [class.show]="showSearch">

    <button
        class="search-btn"
        (click)="toggleSearch()">

        <svg
            xmlns="http://www.w3.org/2000/svg"
            width="19"
            height="19"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#9CA3AF"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round">

            <circle cx="11" cy="11" r="7"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>

        </svg>

    </button>

</div>
