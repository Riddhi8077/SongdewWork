<div class="page">

  <div class="card">

    <h2>Search Employee</h2>

    <div class="search-box">

      <input
        type="text"
        placeholder="Enter Mobile Number"
        [(ngModel)]="searchPhone">

      <button
        type="button"
        (click)="searchEmployee()">
        Search
      </button>

    </div>

    <div *ngIf="employeeData" class="employee-card">

      <h3>Employee Details</h3>

      <div class="detail-row">
        <span>First Name</span>
        <strong>{{ employeeData.firstName }}</strong>
      </div>

      <div class="detail-row">
        <span>Last Name</span>
        <strong>{{ employeeData.lastName }}</strong>
      </div>

      <div class="detail-row">
        <span>Email</span>
        <strong>{{ employeeData.email }}</strong>
      </div>

      <div class="detail-row">
        <span>Phone</span>
        <strong>{{ employeeData.phone }}</strong>
      </div>

      <div class="detail-row">
        <span>Department</span>
        <strong>{{ employeeData.department }}</strong>
      </div>

    </div>

  </div>

  <div class="card">

<h2>Employee Data Entry Form</h2>

  <button
    class="logout-btn"
    (click)="logout()">
    Logout
  </button>
  
    <form
      [formGroup]="employeeForm"
      (ngSubmit)="submitForm()">

      <div class="form-group">
        <label>First Name</label>
        <input
          type="text"
          formControlName="firstName">
      </div>

      <div class="form-group">
        <label>Last Name</label>
        <input
          type="text"
          formControlName="lastName">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          formControlName="email">
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input
          type="text"
          formControlName="phone">
      </div>

      <div class="form-group">
        <label>Department</label>

        <select formControlName="department">
          <option value="">Select Department</option>
          <option>IT</option>
          <option>HR</option>
          <option>Finance</option>
          <option>Marketing</option>
        </select>

      </div>

      <button
        class="submit-btn"
        type="submit">
        Submit
      </button>

    </form>

  </div>

</div>
